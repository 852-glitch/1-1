<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | The Financial Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #10b981;
            --surface: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #f0f9ff 50%, #f5f3ff 100%);
            min-height: 100vh;
        }
        .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-12 text-center border border-white/20">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-8">
            <span class="material-symbols-outlined text-emerald-600 text-4xl">check_circle</span>
        </div>
        
        <h1 class="text-3xl font-extrabold text-slate-900 font-headline mb-4">Message Received!</h1>
        <p class="text-slate-600 mb-10 leading-relaxed">
            Thank you for reaching out. I've received your information and will be in touch within 24 hours to schedule our strategy call.
        </p>

        <div class="space-y-4">
            <a href="index.html" class="block w-full py-4 bg-slate-900 text-white rounded-xl font-semibold hover:bg-slate-800 transition-all transform hover:-translate-y-1">
                Back to Home
            </a>
            <p class="text-xs text-slate-400">
                The Financial Architect • Institutional-Grade Mentorship
            </p>
        </div>
    </div>

</html>
